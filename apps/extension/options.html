<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WatchWork — Options</title>
    <style>
      body { width: 380px; margin: 0; background: #faf7f2; color: #2c1810; font-family: Inter, Arial, sans-serif; padding: 18px; }
      h1 { font-size: 20px; margin: 0 0 16px; }
      label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; }
      input { width: 100%; padding: 8px 10px; border: 1px solid #E8DED3; border-radius: 6px; font-size: 13px; box-sizing: border-box; background: #fff; }
      .section { margin-bottom: 18px; }
      .hint { font-size: 11px; color: #725d50; margin-top: 4px; }
      button { width: 100%; border: 0; border-radius: 6px; background: #2c1810; color: #faf7f2; cursor: pointer; font-weight: 800; padding: 10px; font-size: 13px; }
      button.secondary { background: #E8DED3; color: #2c1810; margin-top: 8px; }
      button.danger { background: #8B1E18; color: #faf7f2; margin-top: 8px; display: none; }
      #status { min-height: 18px; font-size: 12px; color: #725d50; margin-top: 8px; }
      .logged-in { color: #245B31; }
      .logged-out { color: #8B1E18; }
    </style>
  </head>
  <body>
    <h1>WatchWork Settings</h1>

    <div class="section">
      <label for="api_url">API Server URL</label>
      <input id="api_url" type="url" placeholder="http://localhost:8000" />
      <p class="hint">The URL of your WatchWork API server.</p>
    </div>

    <button id="save" class="secondary">Save API URL</button>
    <p id="status"></p>

    <div class="section" style="margin-top: 18px;">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com" autocomplete="username" />
    </div>

    <div class="section">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Your password" autocomplete="current-password" />
    </div>

    <button id="login">Login</button>
    <button id="register" class="secondary">Create Account (auto-login)</button>
    <button id="logout" class="danger">Logout</button>

    <p id="auth-status" class="hint"></p>

    <script src="options.js"></script>
  </body>
</html>
